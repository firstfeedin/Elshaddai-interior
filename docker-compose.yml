version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: elshaddai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: elshaddai
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: elshaddai_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  # ── NestJS API ───────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: elshaddai_api
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/elshaddai
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 3001
      CLIENT_URL: http://localhost:5173
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/dist

  # ── Vite Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: ./divinemercyitsolutions
      dockerfile: Dockerfile
    container_name: elshaddai_frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - api

  # ── Prisma Studio (dev only) ─────────────────────────────────────
  prisma-studio:
    image: node:20-alpine
    container_name: elshaddai_prisma_studio
    working_dir: /app
    command: sh -c "npm install && npx prisma studio --port 5555"
    ports:
      - '5555:5555'
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/elshaddai
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:
