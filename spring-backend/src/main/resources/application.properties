spring.application.name=elshaddai-api
server.port=8080

# ── H2 (dev) ──────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./data/elshaddai;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ── JWT ───────────────────────────────────────────────────────────
jwt.secret=elshaddai-super-secret-jwt-key-2026-change-in-prod-256bit
jwt.expiration-ms=604800000

# ── CORS ──────────────────────────────────────────────────────────
cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:4173

# ── Mail ──────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
contact.to=${CONTACT_TO:contactus@divinemercyitsol.com}

