[build]
builder = "nixpacks"

[deploy]
startCommand = "node seed.js && node server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Environment variables to set in Railway dashboard:
#   JWT_SECRET        — strong random secret (min 32 chars)
#   SMTP_USER         — Gmail address for sending contact emails
#   SMTP_PASS         — Gmail App Password (16-char)
#   CONTACT_TO        — inbox that receives enquiry emails
#   ALLOWED_ORIGINS   — comma-separated list of your Vercel URLs
#   DB_PATH           — /data/elshaddai.sqlite  (after mounting a Railway volume at /data)
#   PORT              — Railway sets this automatically
